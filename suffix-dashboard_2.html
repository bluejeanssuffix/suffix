<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUFFIX Social Media Analytics Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e2e8f0; font-family: 'Segoe UI', -apple-system, sans-serif; }
  
  .header { background: linear-gradient(90deg, #0d1117, #161b22, #0d1117); border-bottom: 1px solid #21262d; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .logo { width: 40px; height: 40px; border-radius: 8px; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; letter-spacing: -0.5px; flex-shrink: 0; }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-sub { font-size: 11px; color: #666; margin-top: 2px; }

  .tab-bar { display: flex; gap: 2px; padding: 10px 16px; overflow-x: auto; background: #0d1117; border-bottom: 1px solid #21262d; position: sticky; top: 0; z-index: 10; }
  .tab-btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap; background: transparent; color: #666; font-family: inherit; transition: all 0.15s; }
  .tab-btn:hover { color: #aaa; }
  .tab-btn.active { font-weight: 700; }

  .content { padding: 20px; max-width: 860px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }

  .stat-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
  .stat-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 12px; padding: 16px 20px; min-width: 140px; flex: 1 1 140px; }
  .stat-label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { color: #fff; font-size: 28px; font-weight: 700; margin: 4px 0; }
  .stat-sub { font-size: 12px; font-weight: 500; }

  .section-title { color: #e2e8f0; font-size: 14px; font-weight: 600; margin: 28px 0 14px; border-bottom: 1px solid #333; padding-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .bar-label { width: 110px; font-size: 12px; color: #ccc; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; background: #1a1a2e; border-radius: 4px; height: 22px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; transition: width 0.4s; }
  .bar-fill span { font-size: 10px; color: #fff; font-weight: 600; }
  .bar-pct-outside { font-size: 10px; color: #888; width: 40px; flex-shrink: 0; }

  .gender-row { display: flex; align-items: center; gap: 20px; margin: 8px 0; }
  .gender-bar { flex: 1; height: 28px; border-radius: 6px; overflow: hidden; display: flex; }
  .gender-male { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; }
  .gender-female { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; }
  .gender-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 11px; }

  .takeaway-box { background: linear-gradient(135deg, #0f172a, #1e293b); border-radius: 10px; padding: 16px; border: 1px solid #334155; margin-top: 24px; }
  .takeaway-kpi { font-size: 11px; color: #f59e0b; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; }
  .takeaway-text { font-size: 13px; color: #cbd5e1; line-height: 1.7; }

  .chart-container { background: #1a1a2e; border-radius: 10px; padding: 16px; margin: 12px 0; position: relative; }
  .chart-container canvas { max-height: 280px; }

  .content-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-radius: 6px; margin-bottom: 2px; }
  .content-row:nth-child(odd) { background: #1a1a2e; }
  .content-title { font-size: 12px; color: #ccc; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .content-views { font-size: 14px; font-weight: 700; margin-left: 12px; flex-shrink: 0; }

  .direction-card { background: linear-gradient(135deg, #0f172a, #1e293b); border-radius: 10px; padding: 16px; margin-bottom: 10px; }
  .direction-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .direction-name { font-size: 15px; font-weight: 700; color: #fff; }
  .direction-pri { font-size: 11px; font-weight: 600; }
  .direction-reason { font-size: 12px; color: #94a3b8; line-height: 1.7; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; }
  .kpi-card { padding: 10px 14px; border-radius: 8px; background: #1a1a2e; }
  .kpi-platform { font-size: 12px; font-weight: 700; }
  .kpi-metric { font-size: 11px; color: #94a3b8; margin-top: 4px; }

  .missing-box { background: #1a1a2e; border-radius: 10px; padding: 16px; font-size: 12px; color: #94a3b8; line-height: 2.2; }

  .info-box { background: linear-gradient(135deg, #0f172a, #1e293b); border-radius: 10px; padding: 16px; border: 1px solid #334155; line-height: 1.8; font-size: 13px; color: #cbd5e1; }

  .platform-header { padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
  .platform-icon { width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
  .platform-name { font-size: 14px; font-weight: 600; color: #fff; }
  .platform-period { font-size: 11px; color: #555; margin-left: 8px; }

  .footer { text-align: center; padding: 24px; font-size: 10px; color: #333; border-top: 1px solid #21262d; margin-top: 40px; }

  @media (max-width: 600px) {
    .stat-card { min-width: 100%; }
    .bar-label { width: 80px; font-size: 11px; }
    .header-title { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">SUFF/X</div>
  <div>
    <div class="header-title">Social Media Analytics Dashboard</div>
    <div class="header-sub">Data Period: Feb – Mar 2026 | All Platforms | Generated from actual platform data</div>
  </div>
</div>

<div class="tab-bar" id="tabBar"></div>

<div class="content" id="content"></div>

<div class="footer">
  SUFFIX Social Media Analytics Dashboard — All data sourced from actual platform analytics (Feb–Mar 2026)<br>
  Generated for internal use by SUFFIX Marketing Team
</div>

<script>
// ── Tab System ────────────────────────────────────────
const TABS = [
  { key:"overview", label:"📊 Overview", color:"#8b5cf6" },
  { key:"facebook", label:"Facebook", color:"#1877F2" },
  { key:"tiktok", label:"TikTok", color:"#00f2ea" },
  { key:"instagram", label:"Instagram", color:"#E4405F" },
  { key:"youtube", label:"YouTube", color:"#FF0000" },
  { key:"lemon8", label:"Lemon8", color:"#FFE135" },
  { key:"spotify", label:"Spotify", color:"#1DB954" },
  { key:"blockdit", label:"Blockdit", color:"#4A90D9" },
  { key:"direction", label:"🧭 Direction", color:"#f59e0b" },
];

let currentTab = "overview";
let chartInstances = [];

function destroyCharts() { chartInstances.forEach(c => c.destroy()); chartInstances = []; }

function renderTabs() {
  const bar = document.getElementById("tabBar");
  bar.innerHTML = TABS.map(t =>
    `<button class="tab-btn ${t.key===currentTab?'active':''}" data-tab="${t.key}" style="${t.key===currentTab ? `background:${t.color}22;color:${t.color}` : ''}">${t.label}</button>`
  ).join("");
  bar.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => { currentTab = btn.dataset.tab; renderTabs(); renderPage(); });
  });
}

function renderPage() {
  destroyCharts();
  const el = document.getElementById("content");
  const renderers = { overview:renderOverview, facebook:renderFacebook, tiktok:renderTikTok, instagram:renderInstagram, youtube:renderYouTube, lemon8:renderLemon8, spotify:renderSpotify, blockdit:renderBlockdit, direction:renderDirection };
  el.innerHTML = "";
  (renderers[currentTab] || renderOverview)(el);
}

// ── Helpers ───────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => { if(k==="style"&&typeof v==="object") Object.assign(el.style,v); else el.setAttribute(k,v); });
  children.flat().forEach(c => { if(typeof c==="string") el.innerHTML+=c; else if(c) el.appendChild(c); });
  return el;
}

function statCard(label, value, sub, color) {
  return `<div class="stat-card" style="border:1px solid ${color}22">
    <div class="stat-label">${label}</div>
    <div class="stat-value">${value}</div>
    ${sub ? `<div class="stat-sub" style="color:${color}">${sub}</div>` : ""}
  </div>`;
}

function sectionTitle(text) { return `<div class="section-title">${text}</div>`; }

function miniBar(data, labelKey, valKey, color) {
  return data.map(d => {
    const w = Math.min(d[valKey], 100);
    const inside = w > 10;
    return `<div class="bar-row">
      <div class="bar-label">${d[labelKey]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:linear-gradient(90deg,${color},${color}88)">${inside?`<span>${d[valKey]}%</span>`:""}</div></div>
      ${!inside ? `<div class="bar-pct-outside">${d[valKey]}%</div>` : ""}
    </div>`;
  }).join("");
}

function genderBar(male, female, mc, fc) {
  mc = mc||"#6366f1"; fc = fc||"#ec4899";
  return `<div class="gender-row"><div class="gender-bar">
    <div class="gender-male" style="width:${male}%;background:${mc}">♂ ${male}%</div>
    <div class="gender-female" style="width:${female}%;background:${fc}">♀ ${female}%</div>
  </div></div>`;
}

function takeawayBox(kpi, text) {
  return `<div class="takeaway-box"><div class="takeaway-kpi">Organic KPI: ${kpi}</div><div class="takeaway-text">${text}</div></div>`;
}

function makeChart(container, id, config) {
  const wrap = document.createElement("div");
  wrap.className = "chart-container";
  wrap.innerHTML = `<canvas id="${id}"></canvas>`;
  container.appendChild(wrap);
  requestAnimationFrame(() => {
    const ctx = document.getElementById(id);
    if(ctx) { const c = new Chart(ctx, config); chartInstances.push(c); }
  });
}

// ── Overview ──────────────────────────────────────────
function renderOverview(el) {
  el.innerHTML = `
    <div class="stat-grid">
      ${statCard("Facebook","4,848","Followers","#1877F2")}
      ${statCard("Instagram","972","Followers","#E4405F")}
      ${statCard("TikTok","1,746","Reached (4w)","#00f2ea")}
      ${statCard("YouTube","+3","Subscribers (28d)","#FF0000")}
      ${statCard("Lemon8","27","Followers","#FFE135")}
      ${statCard("Spotify","~8","Listeners","#1DB954")}
      ${statCard("Blockdit","5","Followers","#4A90D9")}
    </div>
    ${sectionTitle("Cross-Platform Age Comparison (Top 3 channels)")}
    <div class="chart-container"><canvas id="ageChart"></canvas></div>
    ${sectionTitle("Gender Split by Platform")}
    ${genderBar(58.1,41.9,"#1877F2","#ec4899")}
    <div class="gender-labels"><span style="color:#888">Facebook — Male 58.1%</span><span style="color:#888">Female 41.9%</span></div>
    ${genderBar(49.3,50.7,"#00f2ea","#ff6090")}
    <div class="gender-labels"><span style="color:#888">TikTok — Male 49.3%</span><span style="color:#888">Female 50.7%</span></div>
    ${genderBar(58.8,41.2,"#6366f1","#ec4899")}
    <div class="gender-labels"><span style="color:#888">Instagram — Male 58.8%</span><span style="color:#888">Female 41.2%</span></div>
    ${genderBar(62.5,25,"#1DB954","#ec4899")}
    <div class="gender-labels"><span style="color:#888">Spotify — Male 62.5%</span><span style="color:#888">Female 25% (12.5% N/A)</span></div>
    ${sectionTitle("Core Audience Profile")}
    <div class="info-box">
      <strong style="color:#fff">คนไทย อายุ 25-44 ปี เพศชายมากกว่าเล็กน้อย อยู่กรุงเทพฯ</strong><br>
      ทุก Platform มี Core audience ตรงกัน: 25-34 และ 35-44 รวม 65-85% ของทั้งหมด<br>
      ข้อยกเว้น: TikTok เข้าถึง 18-24 ได้ 18.5% (สูงกว่าช่องอื่น 5-6 เท่า) และ Gender สมดุลที่สุด
    </div>
  `;
  requestAnimationFrame(() => {
    const ctx = document.getElementById("ageChart");
    if(!ctx) return;
    const c = new Chart(ctx, {
      type: "bar",
      data: {
        labels: ["18-24","25-34","35-44","45-54","55+"],
        datasets: [
          { label:"Facebook", data:[2.8,39.6,42.0,11.1,4.5], backgroundColor:"#1877F2" },
          { label:"TikTok", data:[18.5,43.7,23.4,9.7,4.7], backgroundColor:"#00f2ea" },
          { label:"Instagram", data:[3.2,42.4,43.2,9.2,2.0], backgroundColor:"#E4405F" },
        ]
      },
      options: { responsive:true, plugins:{ legend:{ labels:{ color:"#aaa", font:{size:11} } } }, scales:{ x:{ ticks:{color:"#888"}, grid:{color:"#222"} }, y:{ ticks:{color:"#888", callback:v=>v+"%"}, grid:{color:"#222"} } } }
    });
    chartInstances.push(c);
  });
}

// ── Facebook ──────────────────────────────────────────
function renderFacebook(el) {
  el.innerHTML = `
    <div class="platform-header"><div class="platform-icon" style="background:#1877F2;color:#fff">f</div><span class="platform-name">Facebook</span><span class="platform-period">Lifetime / Last 28 Days</span></div>
    <div class="stat-grid">
      ${statCard("Followers","4,848","+1 follow (28d)","#f59e0b")}
      ${statCard("Top Country","TH 75.6%","","#1877F2")}
      ${statCard("Top City","BKK 48.6%","","#1877F2")}
      ${statCard("Follows (28d)","1","แทบไม่โต","#ef4444")}
    </div>
    ${sectionTitle("Age & Gender Distribution (%)")}
    <div class="chart-container"><canvas id="fbAgeChart"></canvas></div>
    ${sectionTitle("Gender")}
    ${genderBar(58.1,41.9,"#6366f1","#ec4899")}
    ${sectionTitle("Traffic Source")}
    ${miniBar([{s:"Reels",p:67.5},{s:"Feed",p:18.6},{s:"Your Page",p:6.6},{s:"Unavailable",p:5.5},{s:"Stories",p:1.8}],"s","p","#1877F2")}
    ${sectionTitle("Top Countries")}
    ${miniBar([{n:"Thailand",p:75.6},{n:"Malawi",p:8.7},{n:"Singapore",p:1.9},{n:"Malaysia",p:1.5},{n:"United States",p:1.2},{n:"Philippines",p:1.0}],"n","p","#3b82f6")}
    ${sectionTitle("Top Cities")}
    ${miniBar([{n:"Bangkok",p:48.6},{n:"Lilongwe",p:4.0},{n:"Blantyre",p:2.1},{n:"Nonthaburi",p:2.0},{n:"Singapore",p:1.8},{n:"Chon Buri",p:1.3}],"n","p","#60a5fa")}
    ${takeawayBox("Reach & Engagement Rate","ฐาน Followers ใหญ่ที่สุดแต่ Growth หยุดนิ่ง แทบไม่มี New Follow ใน 28 วัน Reels คือช่องทาง Discovery หลัก (67.5%) ควรเน้น Reels เพื่อ Reactivate audience")}
  `;
  requestAnimationFrame(() => {
    const ctx = document.getElementById("fbAgeChart");
    if(!ctx) return;
    const c = new Chart(ctx, {
      type:"bar",
      data:{ labels:["18-24","25-34","35-44","45-54","55-64","65+"],
        datasets:[
          { label:"Men", data:[2.4,22.4,23.2,6.9,1.6,1.6], backgroundColor:"#6366f1" },
          { label:"Women", data:[0.4,17.2,18.8,4.2,0.6,0.7], backgroundColor:"#ec4899" },
        ]},
      options:{ responsive:true, plugins:{ legend:{ labels:{color:"#aaa",font:{size:11}} } }, scales:{ x:{ticks:{color:"#888"},grid:{color:"#222"}}, y:{ticks:{color:"#888",callback:v=>v+"%"},grid:{color:"#222"}} } }
    });
    chartInstances.push(c);
  });
}

// ── TikTok ────────────────────────────────────────────
function renderTikTok(el) {
  el.innerHTML = `
    <div class="platform-header"><div class="platform-icon" style="background:#00f2ea;color:#000">♪</div><span class="platform-name">TikTok</span><span class="platform-period">Feb 8 – Mar 7, 2026 (4 weeks)</span></div>
    <div class="stat-grid">

      ${statCard("Top City","BKK 53.3%","","#00f2ea")}
    </div>
    ${sectionTitle("Age Distribution (Reached)")}

    ${sectionTitle("Gender")}
    ${genderBar(49.3,50.7,"#00f2ea","#ff6090")}
    ${sectionTitle("Top Countries")}
    ${miniBar([{n:"Thailand",p:96.2},{n:"USA",p:1.0},{n:"Philippines",p:0.4},{n:"Laos",p:0.3},{n:"Australia",p:0.2},{n:"UK",p:0.2}],"n","p","#00f2ea")}
    ${sectionTitle("Top Cities")}
    ${miniBar([{n:"Bangkok",p:53.3},{n:"Surat Thani",p:4.0},{n:"Nonthaburi",p:2.5},{n:"Nakhon Ratchasima",p:2.5},{n:"Phitsanulok",p:2.3},{n:"Chiang Mai",p:2.0}],"n","p","#00d4c8")}
    ${takeawayBox("Reach & Video Views","ช่องทาง Discovery ที่ดีที่สุด เข้าถึง 18-24 ได้มากกว่าช่องอื่น Gender สมดุลที่สุด (50:50) Growth สูงมากเพราะเพิ่งเริ่มทำ ควร Scale ต่อ")}

    <div class="platform-header"><div class="platform-icon" style="background:#E4405F;color:#fff">📷</div><span class="platform-name">Instagram</span><span class="platform-period">Feb 9 – Mar 10, 2026 (30 days)</span></div>

// ── YouTube ───────────────────────────────────────────
function renderYouTube(el) {
  el.innerHTML = `
    <div class="platform-header"><div class="platform-icon" style="background:#FF0000;color:#fff">▶</div><span class="platform-name">YouTube</span><span class="platform-period">Feb 11 – Mar 10, 2026 (28 days)</span></div>

// ── Lemon8 ────────────────────────────────────────────
function renderLemon8(el) {
  el.innerHTML = `
    <div class="platform-header"><div class="platform-icon" style="background:#FFE135;color:#000">🍋</div><span class="platform-name">Lemon8</span><span class="platform-period">Feb 14 – Mar 6, 2026 (3 weeks)</span></div>
    <div class="stat-grid">
